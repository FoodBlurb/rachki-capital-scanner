<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rachki Capital</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--border:#2a2a3a;
  --text:#e2e8f0;--muted:#64748b;
  --green:#10b981;--red:#ef4444;--amber:#f59e0b;
  --teal:#06b6d4;--purple:#8b5cf6;--blue:#3b82f6;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;height:100vh;display:flex;overflow:hidden}
.left-nav{width:160px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;padding:12px 8px;gap:4px}
.nav-logo{font-weight:800;font-size:15px;color:var(--text);padding:6px 8px 14px;letter-spacing:.5px}
.nav-logo span{color:var(--green)}
.nav-item{display:flex;align-items:center;gap:9px;padding:10px 10px;border-radius:8px;border:none;background:none;color:var(--muted);cursor:pointer;font-size:13px;width:100%;text-align:left;transition:all .18s;font-family:inherit}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--bg3);font-weight:600}
.nav-item.wl.active{color:var(--green)}
.nav-item.sc.active{color:var(--amber)}
.nav-item.ema.active{color:var(--teal)}
.nav-item.e12.active{color:var(--blue)}
.nav-item.e13.active{color:var(--purple)}
.nav-item.opt.active{color:#f97316}
/* Options Flow tab */
.opt-wrap{display:flex;flex:1;flex-direction:column;overflow:hidden;padding:10px 12px}
.opt-cols{display:grid;grid-template-columns:1fr 2px 1fr;gap:0;flex:1;overflow:hidden;margin-top:10px}
.opt-col{display:flex;flex-direction:column;overflow:hidden}
.opt-col-div{background:var(--bg3);margin:0 6px}
.opt-col-hdr{padding:8px 10px;font-size:12px;font-weight:700;letter-spacing:.5px;display:flex;align-items:center;gap:6px;background:var(--bg2);border-radius:6px 6px 0 0}
.opt-count{font-size:10px;font-weight:500;color:var(--muted);margin-left:auto}
.opt-col-body{flex:1;overflow-y:auto;padding:4px 6px;display:flex;flex-direction:column;gap:4px}
.nav-icon{font-size:15px;flex-shrink:0}
.main-content{flex:1;display:flex;overflow:hidden}
.panel{display:none;flex:1;flex-direction:column;overflow:hidden}
.panel.active{display:flex}
.scanner-wrap{display:flex;flex:1;overflow:hidden}
.fsb{width:200px;background:var(--bg2);border-right:1px solid var(--border);padding:12px;flex-shrink:0;overflow-y:auto;transition:width .22s}
.fsb.collapsed{width:36px;padding:12px 6px;overflow:hidden}
.fsb-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;min-height:20px}
.fsb-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;white-space:nowrap}
.fsb-toggle{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0;transition:transform .22s;flex-shrink:0}
.fsb.collapsed .fsb-toggle{transform:rotate(180deg)}
.fsb.collapsed .fsb-title,.fsb.collapsed .fsb-body{display:none}
.fsb-group{margin-bottom:14px}
.fsb-label{font-size:11px;color:var(--muted);margin-bottom:6px;display:block}
.fsb-row{display:flex;align-items:center;gap:6px}
.fsb-val{font-size:11px;color:var(--amber);min-width:28px;text-align:right}
input[type=range]{width:100%;accent-color:var(--amber);cursor:pointer}
.num-inp{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:4px;font-size:12px;width:62px}
.sel-inp{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:4px;font-size:12px;width:100%}
.apply-btn{width:100%;padding:7px;background:var(--blue);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;margin-top:4px;transition:opacity .15s}
.apply-btn:hover{opacity:.85}
.race-area{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:10px 12px}
.prog-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:8px;flex-shrink:0}
.prog-fill{height:100%;border-radius:2px;transition:width .5s linear}
.prog-wl{background:linear-gradient(90deg,var(--green),var(--teal))}
.prog-sc{background:linear-gradient(90deg,var(--amber),#fbbf24)}
.prog-ema{background:linear-gradient(90deg,var(--teal),var(--blue))}
.ctrl-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-shrink:0;flex-wrap:wrap}
.conn-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:all .3s}
.conn-dot.live{background:var(--green);box-shadow:0 0 7px var(--green)}
.conn-lbl{font-size:11px;color:var(--muted)}
.badge{font-size:10px;background:var(--green);color:#000;padding:2px 7px;border-radius:10px;font-weight:700}
.sess-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:700;display:none}
.sess-pre{background:rgba(139,92,246,.2);color:var(--purple);border:1px solid var(--purple)}
.sess-reg{background:rgba(16,185,129,.2);color:var(--green);border:1px solid var(--green)}
.sess-post{background:rgba(245,158,11,.2);color:var(--amber);border:1px solid var(--amber)}
.count-lbl{font-size:11px;color:var(--muted)}
.sort-tabs{display:flex;gap:4px;margin-left:auto}
.sort-tab{padding:3px 10px;border-radius:12px;border:1px solid var(--border);background:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}
.sort-tab.active,.sort-tab:hover{background:var(--bg3);color:var(--text)}
.race-btn{padding:4px 14px;border-radius:12px;border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.btn-wl{background:var(--green);color:#000}
.btn-sc{background:var(--amber);color:#000}
.btn-ema{background:var(--teal);color:#000}
.btn-stop{background:var(--muted)!important;color:#fff!important}
.add-bar{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-shrink:0;flex-wrap:wrap}
.ticker-inp{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;font-size:12px;width:90px;text-transform:uppercase;font-family:inherit}
.ticker-inp::placeholder{text-transform:none}
.add-btn{padding:5px 12px;background:var(--blue);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.tag-wrap{display:flex;gap:4px;flex-wrap:wrap}
.ticker-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px 3px 10px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;font-size:11px;color:var(--text)}
.ticker-tag button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:0;line-height:1;transition:color .15s}
.ticker-tag button:hover{color:var(--red)}
.cols{display:flex;gap:8px;flex:1;overflow:hidden;min-height:0}
.col{flex:1;display:flex;flex-direction:column;overflow:hidden}
.col-hdr{font-size:11px;font-weight:700;padding:5px 10px;border-radius:6px;margin-bottom:6px;text-align:center;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0}
.up-hdr{background:rgba(16,185,129,.12);color:var(--green)}
.dn-hdr{background:rgba(239,68,68,.12);color:var(--red)}
.sc-up-hdr{background:rgba(245,158,11,.12);color:var(--amber)}
.col-inner{position:relative;flex:1;overflow-y:auto;overflow-x:hidden}
.col-inner::-webkit-scrollbar{width:3px}
.col-inner::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.idle-msg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;text-align:center;padding:16px}
.row{position:absolute;left:2px;right:2px;height:50px;display:flex;align-items:center;padding:0 6px;border-radius:6px;border:1px solid transparent;cursor:default}
.row.flash{animation:flash .4s ease-out}
@keyframes flash{0%{filter:brightness(2)}100%{filter:brightness(1)}}
.bar-up{background:linear-gradient(135deg,rgba(16,185,129,.18),rgba(6,182,212,.08));border-color:rgba(16,185,129,.18)}
.bar-dn{background:linear-gradient(135deg,rgba(239,68,68,.18),rgba(220,38,38,.08));border-color:rgba(239,68,68,.18)}
.bar-sc-up{background:linear-gradient(135deg,rgba(245,158,11,.18),rgba(251,191,36,.08));border-color:rgba(245,158,11,.18)}
.fill{position:absolute;left:0;top:0;height:100%;border-radius:6px;opacity:.13;transition:width .55s cubic-bezier(.4,0,.2,1)}
.fill-up{background:linear-gradient(90deg,var(--green),var(--teal))}
.fill-dn{background:linear-gradient(90deg,var(--red),#dc2626)}
.fill-sc{background:linear-gradient(90deg,var(--amber),#fbbf24)}
.rank{position:relative;font-size:10px;color:var(--muted);width:18px;flex-shrink:0;text-align:right}
.avatar{position:relative;width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0;margin:0 7px 0 4px}
.rinfo{position:relative;flex:1;display:flex;flex-direction:column;gap:1px;min-width:0;overflow:hidden}
.rsym{font-size:12px;font-weight:800;color:var(--text);white-space:nowrap}
.rname{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rprice{position:relative;display:flex;flex-direction:column;align-items:flex-end;gap:1px;flex-shrink:0}
.lbl{font-size:12px;font-weight:800;white-space:nowrap}
.lbl-up{color:var(--green)}
.lbl-dn{color:var(--red)}
.lbl-sc-up{color:var(--amber)}
.sub{font-size:10px;color:var(--muted);white-space:nowrap}
/* EMA cross cards */
.ec-list{display:flex;flex-direction:column;gap:5px;padding:4px}
.ec-card{display:flex;align-items:center;gap:9px;padding:9px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;transition:border-color .2s}
.ec-card:hover{border-color:var(--teal)}
.ec-av{width:32px;height:32px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.ec-body{flex:1;min-width:0}
.ec-sym{font-size:13px;font-weight:700;color:var(--text)}
.ec-sub{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap}
.ec-right{text-align:right;flex-shrink:0;min-width:80px}
.ec-price{font-size:13px;font-weight:700}
.ec-ema{font-size:10px;color:var(--muted);margin-top:2px}
.ec-mom{font-size:10px;color:var(--muted);margin-top:3px}
.bull{color:var(--green)}
.bear{color:var(--red)}
.ec-divider{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;padding:6px 4px 3px;margin-top:4px;border-top:1px solid var(--border)}
.ec-already{opacity:.65;border-style:dashed}
.ec-already:hover{opacity:1;border-color:var(--muted)}
/* EMA 120 tab */
.e12-wrap{display:flex;flex:1;flex-direction:column;overflow:hidden;padding:10px 12px;gap:8px}
.e12-cols{display:flex;gap:8px;flex:1;overflow:hidden;min-height:0}
.e12-col{flex:1;display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--border);border-radius:8px}
.e12-col-hdr{font-size:11px;font-weight:700;padding:7px 10px;text-align:center;text-transform:uppercase;letter-spacing:.6px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.e12-col-body{flex:1;overflow-y:auto;padding:6px}
.e12-col-body::-webkit-scrollbar{width:3px}
.e12-col-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.e12-sec-title{font-size:9px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:5px 4px 3px;border-top:1px solid var(--border);margin-top:4px}
.e12-sec-title:first-child{border-top:none;margin-top:0}
.e12-card{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:6px;border:1px solid transparent;margin-bottom:3px;cursor:default;transition:border-color .15s}
.e12-card:hover{border-color:var(--border)}
.e12-av{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0}
.e12-info{flex:1;min-width:0}
.e12-sym{font-size:11px;font-weight:700;color:var(--text)}
.e12-detail{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.e12-badge{font-size:10px;font-weight:700;white-space:nowrap;flex-shrink:0}
.e12-above{background:rgba(16,185,129,.07)}
.e12-below{background:rgba(239,68,68,.07)}
.e12-cross-up{background:rgba(16,185,129,.18);border-color:rgba(16,185,129,.5)!important}
.e12-cross-dn{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.5)!important}
.e12-idle{display:flex;align-items:center;justify-content:center;height:80px;font-size:12px;color:var(--muted)}

/* EMA 13 layout */.e13-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
.e13-tf-tabs{display:flex;gap:4px}
.e13-tf-btn{background:#1e1e1e;color:#777;border:1px solid #2a2a2a;padding:3px 12px;border-radius:20px;cursor:pointer;font-size:11px;font-weight:600;transition:all .2s}
.e13-tf-btn.active{background:#0070f3;color:#fff;border-color:#0070f3}
.e13-add-bar{display:flex;gap:4px;margin-left:auto}
.e13-add-bar input{background:#1a1a1a;border:1px solid #2a2a2a;color:#eee;padding:3px 10px;border-radius:20px;font-size:12px;width:120px;outline:none}
.e13-add-bar button{background:#1e1e1e;color:#888;border:1px solid #2a2a2a;padding:3px 10px;border-radius:20px;cursor:pointer;font-size:13px}
.e13-cols{display:grid;grid-template-columns:1fr 1fr;height:100%;overflow:hidden}
.e13-col{overflow-y:auto}
.e13-ch2{font-size:11px;font-weight:700;letter-spacing:1px;padding:8px 12px;position:sticky;top:0;z-index:2;display:flex;align-items:center;gap:6px;border-bottom:1px solid #1a1a1a}
.e13-ah{background:#091409;color:#2ecc71;border-right:1px solid #1a1a1a}
.e13-bh{background:#140909;color:#e74c3c}
.e13-cnt{background:#ffffff15;border-radius:10px;padding:1px 7px;font-size:10px}
.e13-card{padding:8px 12px;border-bottom:1px solid #111;transition:background .15s;border-right:1px solid #1a1a1a}
.e13-card:hover{background:#161616}
.e13-top{background:#0b160b}
.e13-cb .e13-top{background:#160b0b}
.e13-ch{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.e13-rank{color:#333;font-size:10px;font-weight:700;width:16px;text-align:right;flex-shrink:0}
.e13-tn{font-weight:800;font-size:14px;color:#eee;flex:1}
.e13-sp{font-size:13px;font-weight:700}
.e13-cv{display:flex;align-items:center;gap:6px;padding-left:24px;margin-bottom:5px}
.e13-pn{font-size:13px;color:#ccc;font-weight:600}
.e13-arr{color:#333;font-size:10px}
.e13-en{font-size:11px;color:#444}
.e13-bt{height:3px;background:#0a0a0a;border-radius:2px;overflow:hidden;margin:0 0 0 24px}
.e13-bf{height:100%;width:0;background:var(--bc);border-radius:2px;transition:width 1.1s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px var(--bc)}
@keyframes e13fu{0%{background:#2ecc7133}100%{background:transparent}}
@keyframes e13fd{0%{background:#e74c3c33}100%{background:transparent}}
.e13-flash-up{animation:e13fu 1.5s ease-out}
.e13-flash-dn{animation:e13fd 1.5s ease-out}

/* EMA 13 race cards */
.e13-rc{position:relative;overflow:hidden;margin-bottom:2px;border-radius:4px;border-left:3px solid transparent;background:var(--bg2);}
.e13-rc-bar{position:absolute;top:0;left:0;bottom:0;transition:width .7s cubic-bezier(.25,.46,.45,.94);border-radius:0 3px 3px 0;pointer-events:none;}
.e13-rc-inner{position:relative;display:flex;align-items:center;gap:5px;padding:4px 6px;z-index:1;}
</style>
</head>
<body>

<nav class="left-nav">
  <div class="nav-logo">&#128202; <span>Rachki</span></div>
  <button class="nav-item wl active" id="nav-wl" onclick="showPanel('wl')">
    <span class="nav-icon">&#128200;</span><span>Watchlist</span>
  </button>
  <button class="nav-item sc" id="nav-sc" onclick="showPanel('sc')">
    <span class="nav-icon">&#9889;</span><span>Small Cap</span>
  </button>
  
  <button class="nav-item e12" id="nav-e12" onclick="showPanel('e12');window.ema120.load()">
    <span class="nav-icon">&#12336;</span><span>EMA 120</span>
  </button>
  <button class="nav-item e13" onclick="showPanel('e13');window.ema13.load()">〰EMA 13</button></nav>

<div class="main-content">

  <!-- WATCHLIST -->
  <div class="panel active" id="panel-wl">
    <div class="race-area">
      <div class="prog-bar"><div class="prog-fill prog-wl" id="wl-prog" style="width:0%"></div></div>
      <div class="ctrl-bar">
        <span class="conn-dot" id="wl-dot"></span>
        <span class="conn-lbl" id="wl-lbl">Ready</span>
        <span class="badge" id="wl-badge" style="display:none">LIVE</span>
        <span class="sess-badge" id="wl-sess"></span>
        <span class="count-lbl" id="wl-count"></span>
        <div class="sort-tabs">
          <button class="sort-tab active" onclick="wl.setSort('pct',this)">% Chg</button>
          <button class="sort-tab" onclick="wl.setSort('vol',this)">Volume</button>
          <button class="sort-tab" onclick="wl.setSort('price',this)">Price</button>
        </div>
        <button class="race-btn btn-wl" id="wl-btn" onclick="wl.toggle()">&#9654; START</button>
      </div>
      <div class="add-bar">
        <input class="ticker-inp" id="wl-inp" placeholder="e.g. TSLA" onkeydown="if(event.key==='Enter')addTicker()">
        <button class="add-btn" onclick="addTicker()">+ ADD</button>
        <div class="tag-wrap" id="wl-tags"></div>
      </div>
      <div class="cols">
        <div class="col">
          <div class="col-hdr up-hdr">&#9650; GAINERS <span id="wl-up-count"></span></div>
          <div class="col-inner" id="wl-up-inner">
            <div class="idle-msg" id="wl-up-idle">Click START to begin race</div>
          </div>
        </div>
        <div class="col">
          <div class="col-hdr dn-hdr">&#9660; LOSERS <span id="wl-dn-count"></span></div>
          <div class="col-inner" id="wl-dn-inner">
            <div class="idle-msg" id="wl-dn-idle"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- SMALL CAP -->
  <div class="panel" id="panel-sc">
    <div class="scanner-wrap">
      <div class="fsb" id="fsb-sc">
        <div class="fsb-header">
          <span class="fsb-title">Filters</span>
          <button class="fsb-toggle" onclick="toggleFSB('sc')">&#9664;</button>
        </div>
        <div class="fsb-body">
          <div class="fsb-group">
            <label class="fsb-label">Min Rel Vol</label>
            <div class="fsb-row">
              <input type="range" id="f-sc-rv" min="0" max="5" step="0.5" value="0" oninput="document.getElementById('f-sc-rv-v').textContent=this.value+'x'">
              <span class="fsb-val" id="f-sc-rv-v">0x</span>
            </div>
          </div>
          <div class="fsb-group">
            <label class="fsb-label">Min % Change</label>
            <div class="fsb-row">
              <input type="number" class="num-inp" id="f-sc-pct" value="0" min="0" max="100" step="1">
              <span style="font-size:11px;color:var(--muted)">%</span>
            </div>
          </div>
          <div class="fsb-group">
            <label class="fsb-label">Price Range ($)</label>
            <div class="fsb-row">
              <input type="number" class="num-inp" id="f-sc-pmin" value="1" min="0" max="50" step="0.5" style="width:52px">
              <span style="font-size:11px;color:var(--muted)">-</span>
              <input type="number" class="num-inp" id="f-sc-pmax" value="11" min="0" max="50" step="0.5" style="width:52px">
            </div>
          </div>
          <div class="fsb-group">
            <label class="fsb-label">Min $ Volume</label>
            <select class="sel-inp" id="f-sc-dv">
              <option value="0">Any</option>
              <option value="100000">$100K</option>
              <option value="250000">$250K</option>
              <option value="500000">$500K</option>
              <option value="1000000">$1M</option>
            </select>
          </div>
          <button class="apply-btn" onclick="applyFSB('sc')">Apply Filters</button>
        </div>
      </div>
      <div class="race-area">
        <div class="prog-bar"><div class="prog-fill prog-sc" id="sc-prog" style="width:0%"></div></div>
        <div class="ctrl-bar">
          <span class="conn-dot" id="sc-dot"></span>
          <span class="conn-lbl" id="sc-lbl">Ready</span>

<script>
function avatarColor(t){let h=0;for(let i=0;i<t.length;i++)h=(h*31+t.charCodeAt(i))&0xffffff;return'hsl('+(h%360)+',55%,45%)';}
function abb(n){return n&&n.length>18?n.slice(0,16)+'\u2026':n||'';}
function pc(v){return(v>=0?'+':'')+Number(v).toFixed(2)+'%';}
class Ema120Tab {
  constructor(){
    this.tf='day';
    this.aboveTickers=new Set();this.belowTickers=new Set();
    this.aboveRows={};this.belowRows={};
    this.running=false;this.rafId=null;
    this.startTime=0;this.lastFetch=0;this.lastEmaFetch=0;
    this.rawQuotes=[];
  }
  getTickers(){return[...new Set([...JSON.parse(localStorage.getItem('rc_tickers_v2')||'[]')])];}
  setTf(tf,btn){
    this.tf=tf;
    btn.closest('.sort-tabs').querySelectorAll('.sort-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if(this.running){this.aboveTickers=new Set();this.belowTickers=new Set();this._fetchEma();}
  }
  toggle(){this.running?this.reset():this.start();}
  start(){
    this.running=true;this.startTime=performance.now();
    document.getElementById('e12-btn').textContent='STOP';
    this._fetchEma();
    this.rafId=requestAnimationFrame(ts=>this._loop(ts));
  }
  reset(){
    this.running=false;cancelAnimationFrame(this.rafId);this.rafId=null;
    document.getElementById('e12-prog').style.width='0%';
    document.getElementById('e12-btn').textContent='START';
    document.getElementById('e12-dot').className='conn-dot';
    document.getElementById('e12-lbl').textContent='Ready';
    [this.aboveRows,this.belowRows].forEach(rows=>{Object.values(rows).forEach(el=>el.remove());});
    this.aboveRows={};this.belowRows={};
    document.getElementById('e12-above-idle').style.display='';
    document.getElementById('e12-above-count').textContent='';
    document.getElementById('e12-below-count').textContent='';
    this.rawQuotes=[];this.lastFetch=0;
  }
  async _fetchEma(){
    const t=this.getTickers();if(!t.length)return;
    document.getElementById('e12-lbl').textContent='Scanning EMA 120...';
    try{
      const d=await fetch('/api/ema120?wl='+t.join(',')+'&tf='+this.tf).then(r=>r.json());
      (d.results||[]).forEach(r=>{
        if(r.above){this.aboveTickers.add(r.t);this.belowTickers.delete(r.t);}
        else{this.belowTickers.add(r.t);this.aboveTickers.delete(r.t);}
      });
      this.lastEmaFetch=Date.now();
      document.getElementById('e12-lbl').textContent='EMA scanned · '+new Date().toLocaleTimeString();
    }catch(e){document.getElementById('e12-lbl').textContent='EMA error - retrying...';}
  }
  async _fetchQuotes(){
    const t=this.getTickers();if(!t.length)return;
    try{
      const d=await fetch('/api/quotes?extra='+t.join(',')).then(r=>r.json());
      this.rawQuotes=d.tickers||d.stocks||[];
      this._buildRows();
      document.getElementById('e12-dot').className='conn-dot live';
      document.getElementById('e12-lbl').textContent='Live · '+new Date().toLocaleTimeString();
    }catch(e){}
    this.lastFetch=Date.now();
  }
  _loop(ts){
    if(!this.running)return;
    const elapsed=(ts-this.startTime)%45000;
    document.getElementById('e12-prog').style.width=(elapsed/45000*100)+'%';
    if(Date.now()-this.lastFetch>3000)this._fetchQuotes();
    if(Date.now()-this.lastEmaFetch>300000)this._fetchEma();
    this._animateRows();
    this.rafId=requestAnimationFrame(ts=>this._loop(ts));
  }
  _animateRows(){
    [...Object.values(this.aboveRows),...Object.values(this.belowRows)].forEach(el=>{
      if(el._targetY===undefined)return;
      if(el._currentY===undefined)el._currentY=el._targetY;
      el._currentY+=(el._targetY-el._currentY)*0.07;
      el.style.top=el._currentY+'px';
    });
  }
  _buildRows(){
    const ROW_H=50;
    const abAll=this.rawQuotes.filter(s=>this.aboveTickers.has(s.t)).sort((a,b)=>(b.pct||0)-(a.pct||0));
    const blAll=this.rawQuotes.filter(s=>this.belowTickers.has(s.t)).sort((a,b)=>(a.pct||0)-(b.pct||0));
    const maxA=abAll[0]?Math.abs(abAll[0].pct||0):1;
    const maxB=blAll[0]?Math.abs(blAll[0].pct||0):1;
    this._buildCol('e12-above-inner','e12-above-idle','e12-above-count',abAll,true,maxA,ROW_H);
    this._buildCol('e12-below-inner','e12-below-idle','e12-below-count',blAll,false,maxB,ROW_H);
  }
  _buildCol(cid,iid,countId,stocks,isUp,maxM,ROW_H){
    const c=document.getElementById(cid),idle=document.getElementById(iid);
    idle.style.display=stocks.length?'none':'';
    if(!stocks.length){c.style.height='0';return;}
    const rows=isUp?this.aboveRows:this.belowRows;
    stocks.forEach((s,i)=>{
      if(!rows[s.t]){
        const el=document.createElement('div');
        el.className='row '+(isUp?'bar-up':'bar-dn');
        el.innerHTML=
          '<div class="fill '+(isUp?'fill-up':'fill-dn')+'"></div>'+
          '<span class="rank"></span>'+
          '<span class="avatar" style="background:'+avatarColor(s.t)+'">'+s.t.slice(0,2)+'</span>'+
          '<div class="rinfo"><span class="rsym">'+s.t+'</span><span class="rname">'+abb(s.n||s.t)+'</span></div>'+
          '<div class="rprice"><span class="lbl '+(isUp?'lbl-up':'lbl-dn')+'"></span><span class="sub"></span></div>';
        c.appendChild(el);rows[s.t]=el;
      }
      const el=rows[s.t];
      const prevLbl=el.querySelector('.lbl').textContent;
      const newLbl=pc(s.pct||0);
      el.querySelector('.rank').textContent='#'+(i+1);
      el.querySelector('.lbl').textContent=newLbl;
      el.querySelector('.sub').textContent=(s.chg!=null?(s.chg>=0?'+':'')+s.chg.toFixed(2)+' · ':'')+'$'+(s.price||0).toFixed(2);
      el.querySelector('.fill').style.width=(Math.abs(s.pct||0)/maxM*100)+'%';
      el._targetY=i*ROW_H;
      if(el._currentY===undefined)el._currentY=i*ROW_H;
      if(prevLbl&&prevLbl!==newLbl){el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');}
    });
    const ts=new Set(stocks.map(s=>s.t));
    Object.keys(rows).forEach(t=>{if(!ts.has(t)){rows[t].remove();delete rows[t];}});
    c.style.height=(stocks.length*ROW_H)+'px';
    document.getElementById(countId).textContent=stocks.length?'('+stocks.length+')':'';
  }
}

const DEFAULT_TICKERS=['CAR','WEN','ASTS','NFLX','MSFT','V','LLY','COIN','OKLO','IREN','AAPL','META','MSTR','BA','PLTR','CRWV','SNOW','MDB','IWM','AMZN','AVGO','TSLA','SPY','QCOM','APP','NBIS','QQQ','HPE','GOOGL','NVDA','SMCI','MRAM','INTC','CRDO','ORCL','AMD','CBRS','DELL','SNDK','AAOI','LITE','MRVL','MU','BTCUSD'];

function toggleFSB(id){document.getElementById('fsb-'+id).classList.toggle('collapsed');}
function applyFSB(id){
  const tab=sc;
  tab.filters={
    minRelVol:parseFloat(document.getElementById('f-'+id+'-rv').value)||0,
    minPct:parseFloat(document.getElementById('f-'+id+'-pct').value)||0,

    minDolVol:parseFloat(document.getElementById('f-'+id+'-dv').value)||0,
  };

const ROW_H=50,RACE_DUR=45000,POLL_MS=3000,LERP=0.07;
class RaceTab{
  constructor(c){
    Object.assign(this,{running:false,rawStocks:[],filtered:[],upRows:{},dnRows:{},startTime:0,rafId:null,lastFetch:0});
    this.apiUrl=c.apiUrl;this.progId=c.progId;
    this.upId=c.upId;this.dnId=c.dnId;this.upIdleId=c.upIdleId;this.dnIdleId=c.dnIdleId;
    this.upCountId=c.upCountId;this.dnCountId=c.dnCountId;
    this.dotId=c.dotId;this.lblId=c.lblId;this.badgeId=c.badgeId||null;this.countId=c.countId||null;
    this.sessId=c.sessId||null;
    this.btnId=c.btnId;this.sortKey=c.sortKey||'pct';this.filters=c.filters||{};this.sortModes=c.sortModes||null;
    const initMode=this.sortModes&&this.sortModes[c.sortKey||'pct'];
    this.metricFn=(initMode&&initMode.metricFn)||c.metricFn||(s=>Math.abs(s.pct||0));
    this.labelFn=(initMode&&initMode.labelFn)||c.labelFn||(s=>pc(s.pct||0));
    this.subFn=(initMode&&initMode.subFn)||c.subFn||null;
    this.barUp=c.barUp||'bar-up';this.barDn=c.barDn||'bar-dn';
    this.fillUp=c.fillUp||'fill-up';this.fillDn=c.fillDn||'fill-dn';
    this.lblUp=c.lblUp||'lbl-up';this.lblDn=c.lblDn||'lbl-dn';
  }
  getUrl(){return typeof this.apiUrl==='function'?this.apiUrl():this.apiUrl;}
  applyFilters(){
    const f=this.filters;let s=this.rawStocks;
    if(f.minRelVol)s=s.filter(x=>(x.relVol||0)>=f.minRelVol);
    if(f.minPct)s=s.filter(x=>Math.abs(x.pct||0)>=f.minPct);
    if(f.minPrice)s=s.filter(x=>(x.price||0)>=f.minPrice);
    if(f.maxPrice&&f.maxPrice<9000)s=s.filter(x=>(x.price||0)<=f.maxPrice);
    if(f.minDolVol)s=s.filter(x=>(x.price||0)*(x.vol||0)>=f.minDolVol);
    this.filtered=s;if(this.running)this._buildRows();
  }
  splitAndSort(stocks){
    const key=this.sortKey;
    const m=s=>key==='score'?Math.abs(s.pct||0)*(s.relVol||1):key==='relVol'?(s.relVol||0):key==='vol'?(s.vol||0):Math.abs(s.pct||0);
    const up=stocks.filter(s=>(s.pct||0)>=0).sort((a,b)=>m(b)-m(a));
    const dn=stocks.filter(s=>(s.pct||0)<0).sort((a,b)=>m(b)-m(a));
    return{up,dn};
  }
  _buildCol(containerId,idleId,stocks,isUp){
    const container=document.getElementById(containerId);
    const idle=document.getElementById(idleId);
    idle.style.display=stocks.length?'none':'';
    if(!stocks.length){container.style.height='0';return;}
    const barCls=isUp?this.barUp:this.barDn;
    const fillCls=isUp?this.fillUp:this.fillDn;
    const lblCls=isUp?this.lblUp:this.lblDn;
    const rows=isUp?this.upRows:this.dnRows;
    const maxM=this.metricFn(stocks[0])||1;
    stocks.forEach((s,i)=>{
      if(!rows[s.t]){
        const el=document.createElement('div');
        el.className='row '+barCls;
        el.innerHTML='<div class="fill '+fillCls+'"></div><span class="rank"></span><span class="avatar" style="background:'+avatarColor(s.t)+'">'+s.t.slice(0,2)+'</span><div class="rinfo"><span class="rsym">'+s.t+'</span><span class="rname">'+abb(s.n||s.t)+'</span></div><div class="rprice"><span class="lbl '+lblCls+'"></span><span class="sub"></span></div>';
        container.appendChild(el);rows[s.t]=el;
      }
      const el=rows[s.t];
      const prevLbl=el.querySelector('.lbl').textContent;
      const newLbl=this.labelFn(s);
      el.querySelector('.rank').textContent='#'+(i+1);
      el.querySelector('.lbl').textContent=newLbl;
      el.querySelector('.sub').textContent=this.subFn?this.subFn(s):(s.relVol!=null?s.relVol.toFixed(1)+'x vol':'');
      el.querySelector('.fill').style.width=(this.metricFn(s)/maxM*100)+'%';
      el._targetY=i*ROW_H;
      if(el._currentY===undefined)el._currentY=i*ROW_H;
      if(prevLbl&&prevLbl!==newLbl){el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');}
    });
    const tickers=new Set(stocks.map(s=>s.t));
    Object.keys(rows).forEach(t=>{if(!tickers.has(t)){rows[t].remove();delete rows[t];}});
    container.style.height=(stocks.length*ROW_H)+'px';
    document.getElementById(isUp?this.upCountId:this.dnCountId).textContent=stocks.length?'('+stocks.length+')':'';
  }
  _buildRows(){const{up,dn}=this.splitAndSort(this.filtered);this._buildCol(this.upId,this.upIdleId,up,true);this._buildCol(this.dnId,this.dnIdleId,dn,false);}
  async _fetch(){
    try{
      const r=await fetch(this.getUrl());if(!r.ok)throw new Error(r.status);
      const d=await r.json();
      this.rawStocks=d.tickers||d.stocks||d.quotes||(Array.isArray(d)?d:[]);
      this.applyFilters();
      document.getElementById(this.dotId).className='conn-dot live';
      document.getElementById(this.lblId).textContent='Live · '+new Date().toLocaleTimeString();
      if(this.badgeId)document.getElementById(this.badgeId).style.display='';
      if(this.sessId){
        const statMap={};
        this.rawStocks.forEach(s=>{if(s.ms)statMap[s.ms]=(statMap[s.ms]||0)+1;});
        let sess=Object.entries(statMap).sort((a,b)=>b[1]-a[1])[0]?.[0]||'';
        if(!sess){const et=new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));const mins=et.getHours()*60+et.getMinutes();if(mins<570)sess='early_trading';else if(mins<960)sess='regular';else sess='late_trading';}
        const el=document.getElementById(this.sessId);
        if(el){el.className='sess-badge';if(sess==='early_trading'){el.textContent='PRE-MARKET';el.classList.add('sess-pre');}else if(sess==='late_trading'){el.textContent='AFTER-HRS';el.classList.add('sess-post');}else{el.textContent='REGULAR';el.classList.add('sess-reg');}el.style.display='inline-block';}
      }
      if(this.countId)document.getElementById(this.countId).textContent=this.rawStocks.length+' stocks';
    }catch(e){document.getElementById(this.dotId).className='conn-dot';document.getElementById(this.lblId).textContent='Error - retrying...';}
    this.lastFetch=Date.now();
  }
  _loop(ts){
    if(!this.running)return;
    const elapsed=(ts-this.startTime)%RACE_DUR;
    document.getElementById(this.progId).style.width=(elapsed/RACE_DUR*100)+'%';
    if(Date.now()-this.lastFetch>POLL_MS)this._fetch();
    this._animateRows();
    this.rafId=requestAnimationFrame(ts=>this._loop(ts));
  }
  _animateRows(){[...Object.values(this.upRows),...Object.values(this.dnRows)].forEach(el=>{if(el._targetY===undefined)return;el._currentY+=(el._targetY-el._currentY)*LERP;el.style.top=el._currentY+'px';});}
  toggle(){this.running?this.reset():this.start();}
  start(){this.running=true;this.startTime=performance.now();document.getElementById(this.btnId).textContent='STOP';this._fetch();this.rafId=requestAnimationFrame(ts=>this._loop(ts));}
  reset(){
    this.running=false;cancelAnimationFrame(this.rafId);
    document.getElementById(this.progId).style.width='0%';
    document.getElementById(this.btnId).textContent='START';
    [this.upRows,this.dnRows].forEach(rows=>{Object.values(rows).forEach(el=>el.remove());});
    this.upRows={};this.dnRows={};
    document.getElementById(this.upIdleId).style.display='';
    if(document.getElementById(this.dnIdleId))document.getElementById(this.dnIdleId).style.display='';
    document.getElementById(this.upCountId).textContent='';
    document.getElementById(this.dnCountId).textContent='';
    if(this.sessId){const s=document.getElementById(this.sessId);if(s)s.style.display='none';}
    if(this.badgeId){const b=document.getElementById(this.badgeId);if(b)b.style.display='none';}
    document.getElementById(this.dotId).className='conn-dot';
    document.getElementById(this.lblId).textContent='Ready';
    this.rawStocks=[];this.filtered=[];
  }
  setSort(key,btn){
    this.sortKey=key;
    btn.closest('.sort-tabs').querySelectorAll('.sort-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if(this.sortModes&&this.sortModes[key]){const m=this.sortModes[key];if(m.metricFn)this.metricFn=m.metricFn;if(m.labelFn)this.labelFn=m.labelFn;if(m.subFn)this.subFn=m.subFn;}
    if(this.running)this._buildRows();
  }
}

const wl=new RaceTab({
  apiUrl:()=>'/api/quotes'+(customTickers.length?'?extra='+customTickers.join(','):''),
  progId:'wl-prog',upId:'wl-up-inner',dnId:'wl-dn-inner',upIdleId:'wl-up-idle',dnIdleId:'wl-dn-idle',
  upCountId:'wl-up-count',dnCountId:'wl-dn-count',dotId:'wl-dot',lblId:'wl-lbl',
  badgeId:'wl-badge',sessId:'wl-sess',countId:'wl-count',btnId:'wl-btn',sortKey:'pct',filters:{},
  barUp:'bar-up',barDn:'bar-dn',fillUp:'fill-up',fillDn:'fill-dn',lblUp:'lbl-up',lblDn:'lbl-dn',
  labelFn:s=>pc(s.pct||0),
  subFn:s=>(s.chg!=null?(s.chg>=0?'+':'')+s.chg.toFixed(2)+' · ':'')+'$'+(s.price||0).toFixed(2),
  metricFn:s=>Math.abs(s.pct||0),
});

class EmaTab{
  constructor(){this.running=false;this.timer=null;}
  toggle(){this.running?this.stop():this.start();}
  start(){
    if(!customTickers.length){document.getElementById('ema-lbl').textContent='Add tickers to Watchlist first';return;}
    this.running=true;
    const btn=document.getElementById('ema-btn');
    btn.textContent='STOP';btn.classList.add('btn-stop');
    this.scan();
    this.timer=setInterval(()=>this.scan(),60000);
  }
  stop(){
    this.running=false;clearInterval(this.timer);
    const btn=document.getElementById('ema-btn');
    btn.textContent='START';btn.classList.remove('btn-stop');
    document.getElementById('ema-dot').className='conn-dot';
    document.getElementById('ema-lbl').textContent='Stopped';
    const p=document.getElementById('ema-prog');p.style.transition='none';p.style.width='0%';
  }
  calcEMA(prices,period){
    if(prices.length<period)return[];
    const k=2/(period+1);
    const out=new Array(prices.length).fill(null);
    let e=prices.slice(0,period).reduce((a,b)=>a+b,0)/period;
    out[period-1]=e;
    for(let i=period;i<prices.length;i++){e=prices[i]*k+e*(1-k);out[i]=e;}
    return out;
  }
  async scan(){
    const tks=[...customTickers];
    document.getElementById('ema-lbl').textContent='Scanning '+tks.length+' tickers...';
    document.getElementById('ema-dot').className='conn-dot';
    const bull=[],bear=[],abv=[],blw=[];

    const fetched=await Promise.allSettled(
      tks.map(tk=>fetch('/api/bars?ticker='+encodeURIComponent(tk)).then(r=>r.json()).then(d=>({tk,results:d.results||[]})))
    );

    for(const res of fetched){
      if(res.status!=='fulfilled')continue;
      const{tk,results}=res.value;
      if(!results||results.length<125)continue;
      const cls=results.map(b=>b.c);
      const e13=this.calcEMA(cls,13),e120=this.calcEMA(cls,120);
      const n=cls.length;
      for(let i=n-1;i>=Math.max(n-3,120);i--){
        if(e13[i]==null||e120[i]==null||e13[i-1]==null||e120[i-1]==null)continue;
        const pv=e13[i-1]-e120[i-1],cv=e13[i]-e120[i];
        const bar=results[i];
        const t=new Date(bar.t).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
        const mAgo=(n-1-i)*10;
        if(pv<0&&cv>=0){bull.push({tk,price:bar.c,e13:e13[i],e120:e120[i],t,mAgo});break;}
        if(pv>0&&cv<=0){bear.push({tk,price:bar.c,e13:e13[i],e120:e120[i],t,mAgo});break;}
      }
      const xd=bull.some(x=>x.tk===tk)||bear.some(x=>x.tk===tk);
      if(!xd&&e13[n-1]!=null&&e120[n-1]!=null){
        const lb=results[n-1],lt=new Date(lb.t).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
        if(e13[n-1]>e120[n-1])abv.push({tk,price:lb.c,e13:e13[n-1],e120:e120[n-1],t:lt});
        else blw.push({tk,price:lb.c,e13:e13[n-1],e120:e120[n-1],t:lt});
      }
    }

    try{
      const sq=await fetch('/api/quotes?extra='+tks.join(',')).then(r=>r.json());
      const sm={};
      (sq.tickers||sq.stocks||sq.quotes||[]).forEach(s=>{sm[s.t]=s;});
      [...bull,...bear,...abv,...blw].forEach(x=>{
        const s=sm[x.tk];
        if(s){x.dayPct=s.pct;x.relVol=s.relVol;x.vol=s.vol;x.livePrice=s.price;}
      });
    }catch(e){console.warn('snap',e);}

    document.getElementById('ema-dot').className='conn-dot live';
    document.getElementById('ema-lbl').textContent='Live · '+new Date().toLocaleTimeString();
    this.render(bull,bear,abv,blw);
  }
  render(bull,bear,alreadyAbove,alreadyBelow){
    if(!alreadyAbove)alreadyAbove=[];
    if(!alreadyBelow)alreadyBelow=[];
    const ms=x=>Math.abs(x.dayPct||0)*(x.relVol||1);
    alreadyAbove.sort((a,b)=>ms(b)-ms(a));
    alreadyBelow.sort((a,b)=>ms(b)-ms(a));
    bull.sort((a,b)=>a.mAgo-b.mAgo);
    bear.sort((a,b)=>a.mAgo-b.mAgo);
    const ago=m=>m===0?'just now':m+'m ago';
    const spr=(s,up)=>((up?s.e13-s.e120:s.e120-s.e13)/s.e120*100).toFixed(2);
    const mom=x=>{
      if(x.dayPct==null)return '';
      const ps=(x.dayPct>=0?'+':'')+x.dayPct.toFixed(2)+'%';
      const rv=x.relVol!=null?' · '+x.relVol.toFixed(1)+'x vol':'';
      const col=x.dayPct>=0?'var(--green)':'var(--red)';
      return '<div class="ec-mom"><span style="color:'+col+';font-weight:700">'+ps+'</span>'+rv+'</div>';
    };
    const card=(s,up)=>'<div class="ec-card"><div class="ec-av" style="background:'+avatarColor(s.tk)+'">'+s.tk.slice(0,2)+'</div><div class="ec-body"><div class="ec-sym">'+s.tk+'</div><div class="ec-sub">13 EMA '+(up?'crossed above':'crossed below')+' 120 EMA · '+s.t+(s.mAgo>0?' ('+ago(s.mAgo)+')':'')+'</div>'+mom(s)+'</div><div class="ec-right"><div class="ec-price '+(up?'bull':'bear')+'">'+((s.livePrice||s.price).toFixed(2))+'</div><div class="ec-ema">EMA13 '+s.e13.toFixed(3)+' · EMA120 '+s.e120.toFixed(3)+'</div></div></div>';
    const dv=l=>'<div class="ec-divider">'+l+'</div>';
    const ac=(s,up)=>'<div class="ec-card ec-already"><div class="ec-av" style="background:'+avatarColor(s.tk)+'">'+s.tk.slice(0,2)+'</div><div class="ec-body"><div class="ec-sym">'+s.tk+'</div><div class="ec-sub">13 EMA '+(up?'above':'below')+' 120 EMA · '+spr(s,up)+'% spread · '+s.t+'</div>'+mom(s)+'</div><div class="ec-right"><div class="ec-price '+(up?'bull':'bear')+'">'+((s.livePrice||s.price).toFixed(2))+'</div><div class="ec-ema">EMA13 '+s.e13.toFixed(3)+' · EMA120 '+s.e120.toFixed(3)+'</div></div></div>';
    const idle=msg=>'<div class="idle-msg">'+msg+'</div>';
    const upMain=bull.length?'<div class="ec-list">'+bull.map(s=>card(s,true)).join('')+'</div>':idle('No recent bullish crosses (last 30 min)');
    const dnMain=bear.length?'<div class="ec-list">'+bear.map(s=>card(s,false)).join('')+'</div>':idle('No recent bearish crosses (last 30 min)');
    const upRest=alreadyAbove.length?dv('Already Crossed Above - by momentum')+'<div class="ec-list">'+alreadyAbove.map(s=>ac(s,true)).join('')+'</div>':'';
    const dnRest=alreadyBelow.length?dv('Already Crossed Below - by momentum')+'<div class="ec-list">'+alreadyBelow.map(s=>ac(s,false)).join('')+'</div>':'';
    document.getElementById('ema-up-inner').innerHTML=upMain+upRest;
    document.getElementById('ema-dn-inner').innerHTML=dnMain+dnRest;
  }
}

class Ema13Tab {
  constructor(){
    this.tf='daily';
    this.aboveTickers=new Set();this.belowTickers=new Set();
    this.aboveRows={};this.belowRows={};
    this.running=false;this.rafId=null;
    this.startTime=0;this.lastFetch=0;this.lastEmaFetch=0;
    this.rawQuotes=[];
  }
  load(){}
  getTickers(){return[...new Set([...JSON.parse(localStorage.getItem('rc_tickers_v2')||'[]')])];}
  setTf(tf,btn){
    this.tf=tf;
    btn.closest('.sort-tabs').querySelectorAll('.sort-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    if(this.running){this.aboveTickers=new Set();this.belowTickers=new Set();this._fetchEma();}
  }
  toggle(){this.running?this.reset():this.start();}
  start(){
    this.running=true;this.startTime=performance.now();
    document.getElementById('e13-btn').textContent='STOP';
    this._fetchEma();
    this.rafId=requestAnimationFrame(ts=>this._loop(ts));
  }
  reset(){
    this.running=false;cancelAnimationFrame(this.rafId);this.rafId=null;
    document.getElementById('e13-prog').style.width='0%';
    document.getElementById('e13-btn').textContent='START';
    document.getElementById('e13-dot').className='conn-dot';
    document.getElementById('e13-lbl').textContent='Ready';
    [this.aboveRows,this.belowRows].forEach(rows=>{Object.values(rows).forEach(el=>el.remove());});
    this.aboveRows={};this.belowRows={};
    document.getElementById('e13-above-idle').style.display='';
    document.getElementById('e13-above-count').textContent='';
    document.getElementById('e13-below-count').textContent='';
    this.rawQuotes=[];this.lastFetch=0;
  }
  async _fetchEma(){
    const t=this.getTickers();if(!t.length)return;
    document.getElementById('e13-lbl').textContent='Scanning EMA 13...';
    try{
      const d=await fetch('/api/ema13?wl='+t.join(',')+'&tf='+this.tf).then(r=>r.json());
      this.aboveTickers=new Set((d.above||[]).map(r=>r.t));
      this.belowTickers=new Set((d.below||[]).map(r=>r.t));
      this.lastEmaFetch=Date.now();
      document.getElementById('e13-lbl').textContent='EMA scanned · '+new Date().toLocaleTimeString();
    }catch(e){document.getElementById('e13-lbl').textContent='EMA error';}
  }
  async _fetchQuotes(){
    const t=this.getTickers();if(!t.length)return;
    try{
      const d=await fetch('/api/quotes?extra='+t.join(',')).then(r=>r.json());
      this.rawQuotes=d.tickers||d.stocks||[];
      this._buildRows();
      document.getElementById('e13-dot').className='conn-dot live';
      document.getElementById('e13-lbl').textContent='Live · '+new Date().toLocaleTimeString();
    }catch(e){}
    this.lastFetch=Date.now();
  }
  _loop(ts){
    if(!this.running)return;
    const elapsed=(ts-this.startTime)%45000;
    document.getElementById('e13-prog').style.width=(elapsed/45000*100)+'%';
    if(Date.now()-this.lastFetch>3000)this._fetchQuotes();
    if(Date.now()-this.lastEmaFetch>300000)this._fetchEma();
    this._animateRows();
    this.rafId=requestAnimationFrame(ts=>this._loop(ts));
  }
  _animateRows(){
    [...Object.values(this.aboveRows),...Object.values(this.belowRows)].forEach(el=>{
      if(el._targetY===undefined)return;
      if(el._currentY===undefined)el._currentY=el._targetY;
      el._currentY+=(el._targetY-el._currentY)*0.07;
      el.style.top=el._currentY+'px';
    });
  }
  _buildRows(){
    const ROW_H=50;
    const abAll=this.rawQuotes.filter(s=>this.aboveTickers.has(s.t)).sort((a,b)=>(b.pct||0)-(a.pct||0));
    const blAll=this.rawQuotes.filter(s=>this.belowTickers.has(s.t)).sort((a,b)=>(a.pct||0)-(b.pct||0));
    const maxA=abAll[0]?Math.abs(abAll[0].pct||0):1;
    const maxB=blAll[0]?Math.abs(blAll[0].pct||0):1;
    this._buildCol('e13-above-inner','e13-above-idle','e13-above-count',abAll,true,maxA,ROW_H);
    this._buildCol('e13-below-inner','e13-below-idle','e13-below-count',blAll,false,maxB,ROW_H);
  }
  _buildCol(cid,iid,countId,stocks,isUp,maxM,ROW_H){
    const c=document.getElementById(cid),idle=document.getElementById(iid);
    idle.style.display=stocks.length?'none':'';
    if(!stocks.length){c.style.height='0';return;}
    const rows=isUp?this.aboveRows:this.belowRows;
    stocks.forEach((s,i)=>{
      if(!rows[s.t]){
        const el=document.createElement('div');
        el.className='row '+(isUp?'bar-up':'bar-dn');
        el.innerHTML='<div class="fill '+(isUp?'fill-up':'fill-dn')+'"></div><span class="rank"></span><span class="avatar" style="background:'+avatarColor(s.t)+'">'+s.t.slice(0,2)+'</span><div class="rinfo"><span class="rsym">'+s.t+'</span><span class="rname">'+abb(s.n||s.t)+'</span></div><div class="rprice"><span class="lbl '+(isUp?'lbl-up':'lbl-dn')+'"></span><span class="sub"></span></div>';
        c.appendChild(el);rows[s.t]=el;
      }
      const el=rows[s.t];
      const prevLbl=el.querySelector('.lbl').textContent;
      const newLbl=pc(s.pct||0);
      el.querySelector('.rank').textContent='#'+(i+1);
      el.querySelector('.lbl').textContent=newLbl;
      el.querySelector('.sub').textContent=(s.chg!=null?(s.chg>=0?'+':'')+s.chg.toFixed(2)+' · ':'')+'$'+(s.price||0).toFixed(2);
      el.querySelector('.fill').style.width=(Math.abs(s.pct||0)/maxM*100)+'%';
      el._targetY=i*ROW_H;
      if(el._currentY===undefined)el._currentY=i*ROW_H;
      if(prevLbl&&prevLbl!==newLbl){el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');}
    });
    const ts=new Set(stocks.map(s=>s.t));
    Object.keys(rows).forEach(t=>{if(!ts.has(t)){rows[t].remove();delete rows[t];}});
    c.style.height=(stocks.length*ROW_H)+'px';
    document.getElementById(countId).textContent=stocks.length?'('+stocks.length+')':'';
  }
}
