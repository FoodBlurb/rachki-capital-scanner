<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Rachki Capital Scanner</title>
<style>
:root{
  --bg:#0a0d14;--sidebar:#0d1120;
  --border:#1e2d45;--teal:#00e5c8;
  --green:#22c55e;--red:#ef4444;--text:#e2e8f0;--muted:#64748b;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;height:100vh;overflow:hidden}
.sidebar{width:60px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:14px 0;flex-shrink:0}
.logo{width:40px;height:40px;background:linear-gradient(135deg,var(--teal),#0088ff);border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;color:#000;box-shadow:0 0 14px rgba(0,229,200,.35);letter-spacing:-1px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:48px;background:var(--sidebar);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0}
.brand-name{font-size:16px;font-weight:800;letter-spacing:1px}
.conn-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .3s}
.conn-dot.live{background:var(--green);animation:blink 1.6s infinite}
.conn-dot.error{background:var(--red)}
.conn-dot.loading{background:#f59e0b;animation:blink .8s infinite}
@keyframes blink{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}50%{box-shadow:0 0 0 5px rgba(34,197,94,0)}}
.race-progress-bar{height:3px;background:var(--border);flex-shrink:0}
.race-progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--green));width:0%;transition:width .5s linear}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}
.controls-bar{padding:8px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:10px;background:var(--sidebar)}
.scanner-title{font-size:11px;font-weight:800;letter-spacing:2px;color:var(--teal);text-transform:uppercase}
.controls-right{display:flex;align-items:center;gap:7px}
.sort-tabs{display:flex;gap:4px}
.sort-tab{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .15s}
.sort-tab:hover{color:var(--teal);border-color:var(--teal)}
.sort-tab.active{background:rgba(0,229,200,.12);border-color:var(--teal);color:var(--teal)}
.race-btn{padding:4px 12px;border-radius:6px;font-size:10px;font-weight:800;cursor:pointer;border:none;letter-spacing:.5px;transition:all .15s}
.btn-start{background:var(--green);color:#000}
.btn-start:hover{filter:brightness(1.1)}
.btn-reset{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--border)}
.race-area{flex:1;display:flex;gap:0;overflow:hidden;min-height:0}
.race-col{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.race-col.col-up{border-right:1px solid var(--border)}
.col-header{height:34px;display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;font-size:11px;font-weight:800;letter-spacing:1px}
.col-header.up-header{background:rgba(34,197,94,.08);color:var(--green);border-bottom:2px solid rgba(34,197,94,.3)}
.col-header.dn-header{background:rgba(239,68,68,.07);color:var(--red);border-bottom:2px solid rgba(239,68,68,.25)}
.col-count{font-size:10px;font-weight:600;opacity:.7;margin-left:auto}
.race-wrap{flex:1;overflow-y:auto;position:relative;min-height:0}
.race-wrap::-webkit-scrollbar{width:3px}
.race-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.race-inner{position:relative}
.race-row{position:absolute;left:0;right:0;height:42px;display:flex;align-items:center;border-bottom:1px solid rgba(30,45,69,.5);overflow:hidden;transition:top .45s cubic-bezier(.4,0,.2,1)}
.race-bar-bg{position:absolute;left:0;top:0;bottom:0;transition:width .4s ease;opacity:.85;z-index:0}
.race-bar-bg.up{background:linear-gradient(90deg,rgba(34,197,94,.30),rgba(34,197,94,.03))}
.race-bar-bg.dn{background:linear-gradient(90deg,rgba(239,68,68,.27),rgba(239,68,68,.03))}
.race-rank{position:relative;z-index:1;width:24px;text-align:center;font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0}
.race-pct-label{position:relative;z-index:1;width:52px;font-size:11px;font-weight:800;flex-shrink:0;padding-left:2px}
.race-pct-label.up{color:var(--green)}.race-pct-label.dn{color:var(--red)}
.race-avatar{position:relative;z-index:1;width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;flex-shrink:0;margin:0 6px 0 2px;letter-spacing:-.5px;color:#fff}
.race-info{position:relative;z-index:1;flex:1;min-width:0}
.race-ticker{font-size:12px;font-weight:800}
.race-name{font-size:9px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
.race-price-col{position:relative;z-index:1;text-align:right;padding-right:10px;flex-shrink:0}
.race-price{font-size:12px;font-weight:800;font-variant-numeric:tabular-nums}
.race-chg{font-size:9px;font-weight:700;margin-top:1px}
.race-chg.up{color:var(--green)}.race-chg.dn{color:var(--red)}
@keyframes flashGreen{0%{background:rgba(34,197,94,.3)}100%{background:transparent}}
@keyframes flashRed{0%{background:rgba(239,68,68,.25)}100%{background:transparent}}
.flash-up{animation:flashGreen .6s ease-out}
.flash-dn{animation:flashRed .6s ease-out}
.race-idle{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(10,13,20,.8);z-index:10;backdrop-filter:blur(2px)}
.race-idle-icon{font-size:40px}
.race-idle-text{font-size:13px;font-weight:600;color:var(--muted);text-align:center;line-height:1.6}
.btn-start-big{padding:9px 28px;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;border:none;background:var(--green);color:#000;letter-spacing:1px;box-shadow:0 0 20px rgba(34,197,94,.35);transition:all .15s}
.btn-start-big:hover{filter:brightness(1.1);transform:scale(1.03)}
.update-badge{font-size:10px;padding:2px 8px;border-radius:4px;background:rgba(0,229,200,.1);color:var(--teal);border:1px solid rgba(0,229,200,.2)}
.bottom-bar{height:28px;background:var(--sidebar);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;font-size:10px;color:var(--muted)}
.bottom-bar strong{color:var(--teal)}
</style>
<body>
<nav class="sidebar"><div class="logo">RC</div></nav>
<div class="main">
  <header class="topbar">
    <div style="display:flex;align-items:center;gap:10px">
      <span class="brand-name">Rachki Capital</span>
      <div class="conn-status">
        <div class="conn-dot loading" id="connDot"></div>
        <span id="connLabel">Loading...</span>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="update-badge" id="updateBadge">-</span>
      <span style="font-size:10px;color:var(--muted)" id="clock"></span>
    </div>
  </header>
  <div class="race-progress-bar"><div class="race-progress-fill" id="progressFill"></div></div>
  <div class="content">
    <div class="controls-bar">
      <span class="scanner-title">Rachki Capital Scanner</span>
      <div class="controls-right">
        <div class="sort-tabs">
          <button class="sort-tab active" onclick="setSort('dollar',this)">$ Move</button>
          <button class="sort-tab" onclick="setSort('pct',this)">% Move</button>
          <button class="sort-tab" onclick="setSort('vol',this)">Volume</button>
        </div>
        <button class="race-btn btn-start" id="btnStart" onclick="startRace()">START</button>
        <button class="race-btn btn-reset" onclick="resetRace()">RESET</button>
      </div>
    </div>
    <div class="race-area">
      <div class="race-col col-up">
        <div class="col-header up-header">MOMENTUM UP <span class="col-count" id="upCount">-</span></div>
        <div class="race-wrap" id="upWrap">
          <div class="race-inner" id="upInner"></div>
          <div class="race-idle" id="upIdle">
            <div class="race-idle-icon">📈</div>
            <div class="race-idle-text" id="upIdleText">Fetching live data...</div>
            <button class="btn-start-big" onclick="startRace()">START RACE</button>
          </div>
        </div>
      </div>
      <div class="race-col col-dn">
        <div class="col-header dn-header">MOMENTUM DOWN <span class="col-count" id="dnCount">-</span></div>
        <div class="race-wrap" id="dnWrap">
          <div class="race-inner" id="dnInner"></div>
          <div class="race-idle" id="dnIdle">
            <div class="race-idle-icon">📉</div>
            <div class="race-idle-text" id="dnIdleText">Fetching live data...</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="bottom-bar">
    <span>Exchange: <strong>NASDAQ · NYSE · AMEX</strong></span>
    <span id="tickerCountBar">Tickers: <strong>-</strong></span>
    <span>Source: <strong>Massive Market Data</strong></span>
    <span style="color:#f59e0b;font-weight:700;margin-left:4px">⚠ 15-min delayed</span>
    <span style="margin-left:auto" id="bottomDate"></span>
  </div>
</div>
<script>
const PALETTE=['#3b82f6','#8b5cf6','#06b6d4','#f59e0b','#10b981','#ef4444','#6366f1','#ec4899','#14b8a6','#f97316','#84cc16','#a855f7','#0ea5e9','#22c55e','#fb923c','#e11d48','#7c3aed','#0d9488','#dc2626','#d97706'];
const avatarColor=i=>PALETTE[i%PALETTE.length];
const avatarLabel=t=>t.length<=3?t:t.slice(0,2);
const fd=n=>(n>=0?'+$':'-$')+Math.abs(n).toFixed(2);
const fp=n=>(n>=0?'+':'')+n.toFixed(2)+'%';
const fv=v=>v>=1e9?(v/1e9).toFixed(1)+'B':v>=1e6?(v/1e6).toFixed(1)+'M':v>=1e3?(v/1e3).toFixed(0)+'K':String(v);
const POLL_MS=30000,ROW_H=42,RACE_DUR=45000;
let ALL_STOCKS=[],GAINERS=[],LOSERS=[];
let sortKey='dollar',raceState='idle',raceStart=null,pausedElapsed=0,rafId=null,rowsBuilt=false;
let upNoise=[],dnNoise=[],upVals=[],dnVals=[];

async function fetchQuotes(){
  setConn('loading','Refreshing...');
  try{
    const res=await fetch('/api/quotes');
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    if(!data.quotes?.length)throw new Error('No quotes');
    const prev={};
    ALL_STOCKS.forEach(s=>{prev[s.t]=s.price;});
    data.quotes.forEach(s=>{
      const old=prev[s.t];
      if(old!==undefined&&old!==s.price){
        const row=document.getElementById('row-'+s.t);
        if(row){row.classList.remove('flash-up','flash-dn');void row.offsetWidth;row.classList.add(s.price>old?'flash-up':'flash-dn');}
      }
    });
    ALL_STOCKS=data.quotes;
    splitAndSort();
    if(!rowsBuilt){
      buildRows();rowsBuilt=true;
      document.getElementById('upIdleText').textContent=GAINERS.length+' gainers - ready to race';
      document.getElementById('dnIdleText').textContent=LOSERS.length+' losers - ready to race';
    }else if(raceState==='idle'){updatePriceLabels();}
    const t=data.updatedAt?new Date(data.updatedAt).toLocaleTimeString():new Date().toLocaleTimeString();
    document.getElementById('updateBadge').textContent='Updated '+t;
    document.getElementById('tickerCountBar').innerHTML='Tickers: <strong>'+ALL_STOCKS.length+'</strong>';
    document.getElementById('upCount').textContent=GAINERS.length+' stocks';
    document.getElementById('dnCount').textContent=LOSERS.length+' stocks';
    setConn('live','Live');
  }catch(err){setConn('error','Error - retrying');console.error('fetchQuotes:',err);}
}

function splitAndSort(){
  const sorted=[...ALL_STOCKS].sort((a,b)=>{
    if(sortKey==='dollar')return Math.abs(b.chg)-Math.abs(a.chg);
    if(sortKey==='pct')return Math.abs(b.pct)-Math.abs(a.pct);
    return(b.vol||0)-(a.vol||0);
  });
  GAINERS=sorted.filter(s=>s.chg>=0);
  LOSERS=sorted.filter(s=>s.chg<0);
}

function setConn(state,label){
  const dot=document.getElementById('connDot');
  dot.className='conn-dot'+(state==='live'?' live':state==='error'?' error':state==='loading'?' loading':'');
  document.getElementById('connLabel').textContent=label;
}

function buildRows(){
  buildColRows('upInner',GAINERS,'up');
  buildColRows('dnInner',LOSERS,'dn');
  upVals=GAINERS.map(()=>0);dnVals=LOSERS.map(()=>0);
  upNoise=GAINERS.map(()=>({a:0.3+Math.random()*.4,b:Math.random()*Math.PI*2}));
  dnNoise=LOSERS.map(()=>({a:0.3+Math.random()*.4,b:Math.random()*Math.PI*2}));
}

function buildColRows(innerId,stocks,dir){
  const inner=document.getElementById(innerId);
  inner.innerHTML='';inner.style.height=(stocks.length*ROW_H)+'px';
  stocks.forEach((s,i)=>{
    const row=document.createElement('div');
    row.className='race-row';row.id='row-'+s.t;row.style.top=(i*ROW_H)+'px';
    row.innerHTML='<div class="race-bar-bg '+dir+'" id="bar-'+s.t+'" style="width:0%"></div>'+
      '<div class="race-rank" id="rank-'+s.t+'">-</div>'+
      '<div class="race-pct-label '+dir+'" id="pct-'+s.t+'">0%</div>'+
      '<div class="race-avatar" style="background:'+avatarColor(i)+'">'+avatarLabel(s.t)+'</div>'+
      '<div class="race-info"><div class="race-ticker">'+s.t+'</div><div class="race-name">'+s.n+'</div></div>'+
      '<div class="race-price-col">'+
        '<div class="race-price" id="price-'+s.t+'">$'+Math.abs(s.price).toFixed(2)+'</div>'+
        '<div class="race-chg '+dir+'" id="chg-'+s.t+'">'+fd(s.chg)+' '+fp(s.pct)+'</div>'+
      '</div>';
    inner.appendChild(row);
  });
}

function updatePriceLabels(){
  [...GAINERS,...LOSERS].forEach(s=>{
    const el=document.getElementById('price-'+s.t);
    if(el)el.textContent='$'+Math.abs(s.price).toFixed(2);
  });
}

function easeOut(t){return 1-Math.pow(1-t,2.5)}

function tickCol(stocks,noise,vals,elapsed){
  const raw=Math.min(elapsed/RACE_DUR,1);
  stocks.forEach((s,i)=>{
    const n=noise[i]||{a:.3,b:0};
    const adj=Math.max(0,(raw-n.a*.2)/(1-n.a*.2));
    const t=easeOut(Math.min(adj,1));
    const osc=Math.sin(elapsed*.003+n.b)*.015*t;
    vals[i]=Math.abs(s.chg)*Math.min(t+osc,1);
  });
  return raw;
}

function getSortedIdx(stocks,vals){return stocks.map((_,i)=>i).sort((a,b)=>(vals[b]||0)-(vals[a]||0));}

function updateColDOM(stocks,vals,dir){
  if(!stocks.length)return;
  const sorted=getSortedIdx(stocks,vals);
  const maxVal=Math.max(...vals,0.0001);
  sorted.forEach((si,rank)=>{
    const s=stocks[si],val=vals[si]||0,pct=(val/maxVal*100);
    const row=document.getElementById('row-'+s.t);if(!row)return;
    row.style.top=(rank*ROW_H)+'px';
    document.getElementById('bar-'+s.t).style.width=pct.toFixed(1)+'%';
    document.getElementById('rank-'+s.t).textContent=rank+1;
    document.getElementById('pct-'+s.t).textContent=sortKey==='vol'?fv(s.vol):pct.toFixed(1)+'%';
    document.getElementById('price-'+s.t).textContent='$'+Math.abs(s.price).toFixed(2);
    const chgEl=document.getElementById('chg-'+s.t);
    chgEl.textContent=fd(s.chg)+'  '+fp(s.pct);chgEl.className='race-chg '+dir;
  });
}

function raceLoop(){
  const elapsed=pausedElapsed+(Date.now()-raceStart);
  const raw=tickCol(GAINERS,upNoise,upVals,elapsed);
  tickCol(LOSERS,dnNoise,dnVals,elapsed);
  updateColDOM(GAINERS,upVals,'up');
  updateColDOM(LOSERS,dnVals,'dn');
  document.getElementById('progressFill').style.width=(Math.min(raw,1)*100).toFixed(1)+'%';
  rafId=requestAnimationFrame(raceLoop);
}

function startRace(){
  if(!ALL_STOCKS.length){alert('Waiting for live data...');return;}
  if(raceState==='idle'){
    document.getElementById('upIdle').style.display='none';
    document.getElementById('dnIdle').style.display='none';
    buildRows();raceState='running';raceStart=Date.now();pausedElapsed=0;
    document.getElementById('btnStart').textContent='PAUSE';
    rafId=requestAnimationFrame(raceLoop);
  }else if(raceState==='running'){
    cancelAnimationFrame(rafId);pausedElapsed+=Date.now()-raceStart;
    raceState='paused';document.getElementById('btnStart').textContent='RESUME';
  }else if(raceState==='paused'){
    raceStart=Date.now();raceState='running';
    document.getElementById('btnStart').textContent='PAUSE';
    rafId=requestAnimationFrame(raceLoop);
  }
}

function resetRace(){
  cancelAnimationFrame(rafId);
  raceState='idle';raceStart=null;pausedElapsed=0;rowsBuilt=false;
  document.getElementById('progressFill').style.width='0%';
  document.getElementById('btnStart').textContent='START';
  document.getElementById('upIdle').style.display='flex';
  document.getElementById('dnIdle').style.display='flex';
  if(ALL_STOCKS.length){buildRows();rowsBuilt=true;}
}

function setSort(key,btn){
  sortKey=key;
  document.querySelectorAll('.sort-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(ALL_STOCKS.length){splitAndSort();buildRows();rowsBuilt=true;}
}

function tick(){
  const now=new Date();
  document.getElementById('clock').textContent=now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  document.getElementById('bottomDate').textContent=now.toLocaleDateString()+' '+now.toLocaleTimeString();
}
tick();setInterval(tick,1000);
fetchQuotes();
setInterval(fetchQuotes,POLL_MS);
</script>
</body>
</html>
